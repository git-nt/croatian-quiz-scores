{% extends "base.html" %}
{% block title %}Svi igrači{% endblock %}
{% block body %}
<h2>Svi igrači</h2>
{% if player_options is defined %}
<div class="player-toolbar">
  <label class="player-picker-label" for="player-jump">Skoči na igrača</label>
  <select id="player-jump" class="player-select">
    <option value="">— odaberite —</option>
    {% for opt in player_options %}
    <option value="{{ opt.slug }}">{{ opt.name }}</option>
    {% endfor %}
  </select>
</div>
{% endif %}
{% endblock %}
{% block extra_scripts %}
<script>
(function () {
  var sel = document.getElementById('player-jump');
  if (sel) {
    sel.addEventListener('change', function () {
      if (this.value) window.location.href = '{{ base_url }}/players/' + encodeURIComponent(this.value) + '/';
    });
  }
})();
</script>
{% endblock %}
