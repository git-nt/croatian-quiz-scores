<!DOCTYPE html>
<html lang="hr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{% block title %}{{ title }}{% endblock %} · Hrvatski kvizovi – statistike i rezultati</title>
  <link rel="stylesheet" href="{{ base_url }}/static/style.css" />
</head>
<body>
  <header class="site-bar">
    <div class="site-bar-inner">
      <a class="site-logo" href="{{ base_url }}/">Hrvatski kvizovi – statistike i rezultati</a>
    </div>
  </header>
  <div class="wrap">
    <nav class="top">
      <a href="{{ base_url }}/" data-exact="1">Igrači</a>
      <a href="{{ base_url }}/medals/">Medalje</a>
      <a href="{{ base_url }}/events/">Događaji</a>
    </nav>
    <main>
      {% block body %}{% endblock %}
    </main>
  </div>
  {% block extra_scripts %}{% endblock %}
<script>
(function () {
  var path = window.location.pathname.replace(/\/$/, '');
  document.querySelectorAll('nav.top a').forEach(function (a) {
    var href = a.getAttribute('href').replace(/\/$/, '');
    if (path === href) a.classList.add('active');
    else if (!a.dataset.exact && href && path.startsWith(href + '/')) a.classList.add('active');
  });
})();
</script>
</body>
</html>
